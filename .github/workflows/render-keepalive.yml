name: Render Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        env:
          RENDER_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          if [ -z "$RENDER_HEALTH_URL" ]; then
            echo "RENDER_HEALTH_URL secret is not set; skipping keepalive ping."
            exit 0
          fi

          curl --fail --silent --show-error --max-time 20 "$RENDER_HEALTH_URL"
